services:
  db:
    image: postgres:16
    container_name: flowers_db
    restart: always
    environment:
      POSTGRES_USER: flowers_user
      POSTGRES_PASSWORD: flowers_pass
      POSTGRES_DB: flowers_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ollama:
    image: ollama/ollama:latest
    container_name: flowers_ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 20s

  ollama-pull:
    image: ollama/ollama:latest
    container_name: flowers_ollama_pull
    profiles:
      - init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3}
    entrypoint: ["/bin/sh", "-c", "ollama pull \"$OLLAMA_MODEL\""]

  app:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: flowers_app
    restart: always
    env_file:
      - .env
    ports:
      - "8100:8100"
    depends_on:
      - ollama
    environment:
      OLLAMA_BASE_URL: http://ollama:11434

  front:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: flowers_front
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - app
    volumes:
      - ./front:/app
      - front_node_modules:/app/node_modules

  pgadmin:
    image: dpage/pgadmin4
    container_name: flowers_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@flowers.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data:
  ollama_data:
  front_node_modules:
